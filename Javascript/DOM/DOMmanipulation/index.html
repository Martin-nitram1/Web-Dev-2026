<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOM Manipulation Example</title>
</head>
<body>
  <h1 id="title">Original Title</h1>
  <p class="description">This is the original description.</p>
  <button onclick="changeContent()">Change Content</button>

  <script>
    let isChanged = false;

    function changeContent() {
      let titleElement = document.getElementById('title');
      let descriptionElement = document.querySelector('.description');

      if (isChanged) {
        titleElement.textContent = 'Original Title';
        descriptionElement.textContent = 'This is the original description.';
        isChanged = false;
      } else {
        titleElement.textContent = 'New Title';
        descriptionElement.textContent = 'This is the new description.';
        isChanged = true;
      }
    }
  </script>
</body>
</html>
