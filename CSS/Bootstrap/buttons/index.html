<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Introduction</title>
    <!-- Bootstrap CSS via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <div class="container mt-5 text-center">
    <h1 class="text-primary">Welcome to Bootstrap Components</h1>
    <p class="lead">Bootstrap provides ready-to-use UI elements like buttons, cards, and navigation.</p>
    
    <button class="btn btn-primary">Primary Button</button>
    <button class="btn btn-secondary">Secondary Button</button>
    <button class="btn btn-success">Success Button</button>
    <button class="btn btn-danger">Danger Button</button>

    <button class="btn btn-lg btn-warning">Large Button</button>
    <button class="btn btn-sm btn-info">Small Button</button>
    <button class="btn btn-outline-dark">Outlined Button</button>
</div>

</body>
</html>
